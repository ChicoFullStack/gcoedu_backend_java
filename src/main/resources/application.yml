server:
  tomcat:
    threads:
      max: 200
    accept-count: 200

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: gcoedu-core
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-naming-strategy: SNAKE_CASE
  datasource:
    hikari:
      maximum-pool-size: 80
      minimum-idle: 10
    url: ${DATABASE_URL:jdbc:postgresql://179.197.232.2:5432/postgres?options=-c%20client_encoding=UTF8}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASS:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${REDIS_HOST:redis.bilzao.shop}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis1234}

jwt:
  secret: ${JWT_SECRET_KEY:55e0a4826835cf63ee30bcf0972f5df410fa775bd807041bd9a317cf0c45d5e4}
  expiration: 86400000 # 24 hours

minio:
  url: ${MINIO_SERVER_URL:http://backend-minio-5b3619-179-197-232-2.sslip.io}
  access-key: ${MINIO_ROOT_USER:minioadmin}
  secret-key: ${MINIO_ROOT_PASSWORD:23rhdehny5hppnmr}
  bucket: ${MINIO_BUCKET:gcoedu}

logging:
  level:
    com.gcoedu.core: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

